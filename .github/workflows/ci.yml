name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cpp-build-test:
    name: C++ Build & Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        # FetchContent handles spdlog, googletest, nlohmann_json at configure time.
        # Only system-level packages that find_package() requires are installed here.
        run: |
          brew install boost fmt yaml-cpp openssl@3

      - name: Configure CMake
        run: |
          cmake -B engine/build -S engine \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)

      - name: Build
        run: cmake --build engine/build -j$(sysctl -n hw.logicalcpu)

      - name: Run tests
        working-directory: engine/build
        run: ctest --output-on-failure

  python-lint-test:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # Install runtime deps + the dev extras (ruff, mypy, pytest, pytest-asyncio)
        # and the backtest extras so ruff can check backtest/ without import errors.
        # The package itself is not built here — the C++ extension is not needed
        # for linting and pure-Python test runs.
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy pandas pyyaml aiohttp anthropic cachetools ib_insync \
            matplotlib jinja2 scipy \
            ruff mypy pytest pytest-asyncio

      - name: Lint with ruff
        run: ruff check src/ backtest/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: |
          PYTHONPATH=src pytest tests/ -v \
            --ignore=tests/test_bindings.py \
            -k "not test_ibkr"
